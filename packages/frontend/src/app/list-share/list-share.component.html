<div class="list-share__container">
  <mat-form-field class="list-share__user-chips">
    <mat-chip-grid #chipGrid aria-label="User selection">
      @for (user of users; track user) {
        <mat-chip-row (removed)="remove(user)">
          {{ user.email }}
          <button matChipRemove [attr.aria-label]="'remove ' + user.email">
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-chip-row>
      }
      <input
        type="email"
        (paste)="onPaste($event)"
        placeholder="Share with..."
        i18n-placeholder="@@share.placeholder"
        [formControl]="emailControl"
        [matChipInputFor]="chipGrid"
        [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
        (matChipInputTokenEnd)="add($event)"
        />
    </mat-chip-grid>
  </mat-form-field>

  @if (error()) {
    <p class="list-share__error">{{ error() }}</p>
  }

  <div class="list-share__actions">
    @if (sending()) {
      <button class="list-share__share-button" mat-raised-button disabled>
        <mat-spinner diameter="20" />
      </button>
    } @else {
      <button
        class="list-share__share-button"
        mat-raised-button
        color="primary"
        (click)="share()"
        [disabled]="users.length === 0"
        i18n="@@share.shareButton"
      >
        Share
      </button>
    }
  </div>
</div>
